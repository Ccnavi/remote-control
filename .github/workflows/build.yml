name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'client/requirements.txt'

      - name: Install dependencies
        run: |
          cd client
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: |
          cd client
          pyinstaller --onefile --windowed --name RemoteControl --clean --noconfirm remote_control.py

      - name: Rename with version
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME:-dev}
          mv client/dist/RemoteControl.exe "client/dist/RemoteControl_${VERSION}.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RemoteControl-Windows
          path: client/dist/RemoteControl_*.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: client/dist/RemoteControl_*.exe
          generate_release_notes: true
